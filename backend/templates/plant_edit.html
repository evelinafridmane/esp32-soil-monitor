{% extends "base.html" %}

{% block title %}Edit {{ plant.name }} &middot; Soil Monitor{% endblock %}

{% block content %}
<p><a href="/plants/{{ plant.id }}" class="back-link">&larr; Back to {{ plant.name }}</a></p>

<article>
    <h2>Edit plant</h2>

    <form action="/plants/{{ plant.id }}" method="post">
        <label for="name">Plant name
            <input type="text" id="name" name="name" value="{{ plant.name }}" required>
        </label>

        <label for="plant_type">Plant type
            <div class="grid">
                <select id="plant_type_picker" onchange="document.getElementById('plant_type').value = this.value;">
                    <option value="">-- pick existing --</option>
                    {% for ptype in plant_types %}
                    <option value="{{ ptype }}" {% if ptype == plant.plant_type %}selected{% endif %}>{{ ptype }}</option>
                    {% endfor %}
                </select>
                <input type="text" id="plant_type" name="plant_type" value="{{ plant.plant_type }}" placeholder="or type a new one">
            </div>
            <small>Pick from the list, or type a new one (we'll auto-generate care info).</small>
        </label>

        <h4>Moisture thresholds</h4>
        <p><small>Higher numbers = drier.</small></p>

        <div class="grid">
            <label for="threshold_dry">Needs water above
                <input type="number" id="threshold_dry" name="threshold_dry" value="{{ plant.threshold_dry }}" required>
            </label>
            <label for="threshold_getting_dry">Getting dry above
                <input type="number" id="threshold_getting_dry" name="threshold_getting_dry" value="{{ plant.threshold_getting_dry }}" required>
            </label>
            <label for="threshold_too_wet">Too wet below
                <input type="number" id="threshold_too_wet" name="threshold_too_wet" value="{{ plant.threshold_too_wet }}" required>
            </label>
        </div>

        <button type="submit">Save changes</button>
        <a href="/plants/{{ plant.id }}" role="button" class="secondary outline">Cancel</a>
    </form>
</article>
{% endblock %}
